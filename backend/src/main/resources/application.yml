server:
  port: 8082
  forward-headers-strategy: native
  servlet:
    context-path: /

spring:
  application:
    name: kizuNavi
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: KizuNaviHikariCP
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1200000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

# CORS 許可オリジン（カンマ区切り）。Docker では .env の CORS_ALLOWED_ORIGINS と揃える
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5175}
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5175}
  auth:
    max-failed-login-attempts: ${AUTH_MAX_FAILED_ATTEMPTS:5}
    lock-duration-minutes: ${AUTH_LOCK_DURATION_MINUTES:15}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cookie-secure: ${JWT_COOKIE_SECURE:false}

aws:
  secrets:
    enabled: ${AWS_SECRETS_ENABLED:true}
    region: ${AWS_SECRETS_REGION:ap-northeast-1}
    prefix: ${AWS_SECRETS_PREFIX:kizunavi}
  ses:
    enabled: ${AWS_SES_ENABLED:true}
    region: ${AWS_SES_REGION:ap-northeast-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    from-email: ${AWS_SES_FROM_EMAIL:info@kizunavi.jp}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.kizunavi: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${HIBERNATE_BIND_LOG:WARN}
