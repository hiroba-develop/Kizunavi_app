server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    context-path: /

spring:
  application:
    name: product-template
  
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521:xe}
    username: ${DB_USERNAME:template_user}
    password: ${DB_PASSWORD:template_pass}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: ProductTemplateHikariCP
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1200000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

# CORS 許可オリジン（カンマ区切り）。Docker では .env の CORS_ALLOWED_ORIGINS と揃える
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-at-least-32-characters-long}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cookie-secure: ${JWT_COOKIE_SECURE:false}

aws:
  ses:
    region: ${AWS_SES_REGION:ap-northeast-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    from-email: ${AWS_SES_FROM_EMAIL:noreply@example.com}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.product.template: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${HIBERNATE_BIND_LOG:WARN}
