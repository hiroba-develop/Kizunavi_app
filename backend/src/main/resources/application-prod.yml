# 本番環境設定（AWS RDS Oracle、SES有効）
# 環境変数で DB_URL, DB_USERNAME, DB_PASSWORD, AWS_*, JWT_SECRET を設定してください
spring:
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

aws:
  ses:
    enabled: true

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.product.template: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG:WARN}
